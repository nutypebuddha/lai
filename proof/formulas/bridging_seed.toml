# ─── NAND → Logic: Gate derivation (Mangala ↔ Budha) ────────────────────────
# Proves each derived gate is computable from NAND alone.

[[formula]]
id = "nand_to_not"
tags = ["nand", "logic", "derivation", "bedrock", "mangala"]
from = "mangala"
to = "budha"
inputs = ["a"]
output = "not_a"
expression = "1 - a"
description = "NAND→NOT: self-NAND produces negation; the first derivation from the bedrock"
aspect = "trine"
evidence = "nand(a,a) = 1 - a*a = 1 - a; NOT is the sole axiom-level derivation"

[[formula]]
id = "nand_to_and"
tags = ["nand", "logic", "derivation", "bedrock", "mangala"]
from = "mangala"
to = "budha"
inputs = ["a", "b"]
output = "and_ab"
expression = "a * b"
description = "NAND→AND: NOT(NAND(a,b)) = a*b; conjunction as NAND followed by self-NAND"
aspect = "trine"
evidence = "and(a,b) = not(nand(a,b)) = 1-(1-a*b) = a*b; proven by Peano multiplication"

[[formula]]
id = "nand_to_or"
tags = ["nand", "logic", "derivation", "bedrock", "mangala"]
from = "mangala"
to = "budha"
inputs = ["a", "b"]
output = "or_ab"
expression = "a + b - a * b"
description = "NAND→OR: NAND(NOT(a),NOT(b)) = a+b-ab; disjunction as dual-input NAND"
aspect = "trine"
evidence = "or(a,b) = nand(1-a, 1-b) = 1-(1-a)(1-b) = a+b-ab"

[[formula]]
id = "nand_to_xor"
tags = ["nand", "logic", "derivation", "bedrock", "mangala"]
from = "mangala"
to = "budha"
inputs = ["a", "b"]
output = "xor_ab"
expression = "a + b - 2 * a * b"
description = "NAND→XOR: exclusive-or as composed NAND gates; parity detection from bedrock"
aspect = "trine"
evidence = "xor(a,b) = or(and(a,not(b)),and(not(a),b)) = a+b-2ab; continuous extension"

[[formula]]
id = "nand_to_implies"
tags = ["nand", "logic", "derivation", "bedrock", "mangala"]
from = "mangala"
to = "budha"
inputs = ["a", "b"]
output = "implies_ab"
expression = "1 - a + a * b"
description = "NAND→IMPLIES: material conditional from NAND; the bridge from logic to proof"
aspect = "trine"
evidence = "implies(a,b) = or(not(a),b) = (1-a)+b-(1-a)b = 1-a+ab; false only when a=1,b=0"

