id = "ripple_carry_adder"
language = "rust"
template = "chain full_adders: result_bit[i], carry_out[i] = full_adder(a[i], b[i], carry_in[i])"

complexity = 6
is_anti_pattern = false
level = 9

# ─── Layer 5: NAND-Proven Logic Patterns ─────────────────────────────────────
# Formal proofs that each logic gate is derivable from NAND.
# These connect the primitive NAND layer to the Boolean logic layer,
# which in turn grounds the formula registry's Logic type.

[[logic]]
id = "nand_axiom"
form = "nand(a, b) = 1 - a*b"
premises = ["Sheffer stroke axiom: nand is functionally complete"]
conclusion = "All Boolean functions expressible as NAND composition"
is_valid = true

[[logic]]
id = "not_from_nand"
form = "not(a) = nand(a, a)"
premises = ["nand(a, a) = 1 - a*a = 1 - a"]
conclusion = "NOT is derivable from NAND via self-application"
is_valid = true

[[logic]]
id = "and_from_nand"
form = "and(a, b) = not(nand(a, b))"
premises = ["nand(a, b) = 1 - a*b", "not(x) = 1 - x"]
conclusion = "AND is derivable as NOT(NAND(a,b)) = 1 - (1 - a*b) = a*b"
is_valid = true

[[logic]]
id = "or_from_nand"
form = "or(a, b) = nand(not(a), not(b))"
premises = ["not(a) = nand(a,a) = 1-a", "nand(1-a, 1-b) = 1-(1-a)(1-b) = a+b-ab"]
conclusion = "OR is derivable from NAND via negated inputs"
is_valid = true

[[logic]]
id = "nor_from_nand"
form = "nor(a, b) = not(or(a, b))"
premises = ["or(a,b) = nand(not(a),not(b))", "not(x) = nand(x,x)"]
conclusion = "NOR is derivable as NOT(OR(a,b)) = NOT(NAND(NOT(a),NOT(b)))"
is_valid = true

[[logic]]
id = "xor_from_nand"
form = "xor(a, b) = or(and(a, not(b)), and(not(a), b))"
premises = ["and(a,not(b)) = a*(1-b)", "and(not(a),b) = (1-a)*b", "or sums them: a+b-2ab"]
conclusion = "XOR is derivable from NAND via AND/OR/NOT composition; continuous: a+b-2ab"
is_valid = true

[[logic]]
id = "xnor_from_nand"
form = "xnor(a, b) = not(xor(a, b))"
premises = ["xor(a,b) = a+b-2ab", "not(x) = 1-x"]
conclusion = "XNOR is derivable as NOT(XOR) = 1-a-b+2ab; equals 1 when a=b"
is_valid = true

[[logic]]
id = "implies_from_nand"
form = "implies(a, b) = or(not(a), b)"
premises = ["implies(a,b) is false only when a=1 and b=0", "or(not(a),b) = (1-a)+b-(1-a)b = 1-a+ab"]
conclusion = "IMPLIES is derivable from NAND via NOT and OR; material conditional A→B ≡ ¬A∨B"
is_valid = true

[[logic]]
id = "addition_from_nand"
form = "a + b via half_adder(a,b) = (xor(a,b), and(a,b))"
premises = ["sum = xor(a,b) = a+b-2ab (continuous)", "carry = and(a,b) = a*b", "bits_to_u8 maps 4-bit result to integer"]
conclusion = "Integer addition is derivable from NAND via XOR/AND → half_adder → full_adder → add4"
is_valid = true

[[logic]]
id = "de_morgan_from_nand"
form = "not(and(a,b)) = or(not(a),not(b)) and not(or(a,b)) = and(not(a),not(b))"
premises = ["not(and(a,b)) = 1-ab", "or(not(a),not(b)) = (1-a)+(1-b)-(1-a)(1-b) = 1-ab"]
conclusion = "De Morgan's laws hold for Boolean values {0,1}; noted: do NOT hold for continuous f64 in [0,1]"
is_valid = true

[[logic]]
id = "nand_functional_completeness"
form = "Every Boolean function f: {0,1}^n → {0,1} expressible as NAND-only composition"
premises = ["NAND is not affine (depends on both inputs non-trivially)", "NAND is not self-dual", "NAND is not monotone", "Post's criterion: a gate is functionally complete iff it is not affine, not self-dual, not monotone, not the constant 0, not the constant 1"]
conclusion = "NAND satisfies all Post criteria → functionally complete → all gates derivable"
is_valid = true
