# Non-math formulas: Logic patterns (Aries / Logic)
[[logic]]
id = "modus_ponens"
form = "If P then Q. P. Therefore Q."
premises = ["If P then Q", "P"]
conclusion = "Q"
is_valid = true

[[logic]]
id = "modus_tollens"
form = "If P then Q. Not Q. Therefore not P."
premises = ["If P then Q", "Not Q"]
conclusion = "Not P"
is_valid = true

[[logic]]
id = "syllogism"
form = "All A are B. All B are C. Therefore all A are C."
premises = ["All A are B", "All B are C"]
conclusion = "All A are C"
is_valid = true

[[logic]]
id = "affirming_consequent"
form = "If P then Q. Q. Therefore P."
premises = ["If P then Q", "Q"]
conclusion = "P"
is_valid = false
counterexample = "If it rains, the ground is wet. The ground is wet. Therefore it rained. (Could be from sprinklers)"

[[logic]]
id = "denying_antecedent"
form = "If P then Q. Not P. Therefore not Q."
premises = ["If P then Q", "Not P"]
conclusion = "Not Q"
is_valid = false
counterexample = "If it rains, the ground is wet. It did not rain. Therefore the ground is not wet. (Could be from sprinklers)"
# ☿ Capstone — LLM-gated formulas
#
# `formula_type = "llm"` formulas hold a prompt template in `expression`
# ({input} placeholders), not evaluable arithmetic. Bankai renders the
# template, asks the capstone model (capstone/athena-qwen.toml) at
# temperature 0, and admits the value only if it passes the deterministic
# gates in src/bankai/llm_eval.rs: exactly one finite number in the output.
# A successful LLM step carries reduced chain confidence — estimated, never
# proven. Evaluating these requires a build with --features llm and an
# attached capstone; other builds fail cleanly at eval time.

[[formula]]
id = "estimate_reading_minutes"
formula_type = "llm"
tags = ["capstone", "estimation", "language", "mercury"]
domain = "budha"
inputs = ["word_count"]
output = "reading_minutes"
expression = "Estimate how many minutes an average adult needs to read {word_count} words of ordinary prose."
description = "Reading time estimate — capstone generation, numeric-gated"
evidence = "None — LLM estimate admitted through the llm_eval gates, confidence-penalized"

# ═══════════════════════════════════════════════════════════════════════════════
# NAND-TO-TOP PIPELINE
# ═══════════════════════════════════════════════════════════════════════════════
#
# The complete derivation chain: NAND (Sheffer stroke) → all logic gates →
# arithmetic → grammar rules → code patterns → logic proofs → formulas →
# entities → astrology. Each layer is grounded in the one below it.
#
# Layer 0: NAND — nand(a,b) = 1 - a*b (absolute bedrock)
# Layer 1: Derived gates — not, and, or, nor, xor, xnor, implies (from NAND)
# Layer 2: Arithmetic — half_adder, full_adder, add4 (from gates)
# Layer 3: Grammar — structural rules for expression syntax
# Layer 4: Code — compilation templates for gate→hardware/software
# Layer 5: Logic — formal proofs of gate equivalences
# Layer 6: Formulas — evaluable expressions in the formula registry
# Layer 7: Entities — grounded tokens with Vedic classification
# Layer 8: Astrology — 7-axis classification from domain resolution
#
# This section wires layers 3-5 to NAND (layers 0-2) so that every
# grammar rule, code pattern, and logic proof traces back to the
# Sheffer stroke.
# ═══════════════════════════════════════════════════════════════════════════════

# ─── Layer 3: NAND-Grounded Grammar Rules ────────────────────────────────────
# Structural rules describing how NAND expressions are parsed and transformed.
# These govern the syntax that feeds into the formula registry.

[[grammar]]
id = "nand_expression_syntax"
pattern = "nand\\s*\\(\\s*\\w+\\s*,\\s*\\w+\\s*\\)"
transform = "validate two-argument NAND gate syntax"
description = "NAND expression syntax — nand(a, b) is the atomic expression; all other gates derive from it"
rule_type = "structural"
level = 0
evidence = "Sheffer stroke: nand(a,b) = 1 - a*b; functionally complete Boolean primitive"

[[grammar]]
id = "nestable_gate_syntax"
pattern = "(nand|not|and|or|nor|xor|xnor|implies)\\s*\\("
transform = "allow recursive nesting — gates accept gate expressions as arguments"
description = "Nestable gate syntax — any gate output can feed as input to another gate, building arbitrary Boolean functions"
rule_type = "structural"
level = 3
evidence = "Functional completeness: every Boolean function expressible as NAND-only composition"

[[grammar]]
id = "gate_precedence"
pattern = "(nand|and|or|not|nor|xor|xnor|implies)\\s*\\("
transform = "apply precedence: not > and > xor > or > implies > nand"
description = "Gate operator precedence — NOT binds tightest, NAND binds loosest, enabling unambiguous parsing"
rule_type = "structural"
level = 6
evidence = "Standard Boolean algebra precedence; mirrors arithmetic (not=unary, and=multiplicative, or=additive)"

[[grammar]]
id = "variable_binding"
pattern = "\\b([a-z]\\w*)\\b\\s*(,|\\))"
transform = "bind lowercase identifiers as input variables; uppercase or numeric as constants"
description = "Variable binding in gate expressions — lowercase names become DAG input nodes resolved at evaluation time"
rule_type = "structural"
level = 0
evidence = "Athena NandDag: add_input(name) creates named variable nodes; values supplied via HashMap at eval"

[[grammar]]
id = "constant_fold_pattern"
pattern = "(nand|and|or|not)\\s*\\(\\s*\\d+\\.?\\d*\\s*,\\s*\\d+\\.?\\d*\\s*\\)"
transform = "evaluate constant subexpressions at compile time"
description = "Constant folding — gate expressions with only literal inputs can be reduced to a single constant"
rule_type = "structural"
level = 9
evidence = "Compiler optimization: constant folding eliminates redundant computation in NandDag"

[[grammar]]
id = "de_morgan_transform"
pattern = "(not\\s*\\(\\s*and|not\\s*\\(\\s*or)"
transform = "apply De Morgan: not(and(a,b)) = or(not(a),not(b)); not(or(a,b)) = and(not(a),not(b))"
description = "De Morgan transformation — distribute negation inward by flipping AND/OR operators"
rule_type = "structural"
level = 9
evidence = "De Morgan's laws: ¬(A∧B) = ¬A∨¬B and ¬(A∨B) = ¬A∧¬B; verified for Boolean values in nand.rs"

[[grammar]]
id = "double_negation_elimination"
pattern = "not\\s*\\(\\s*not\\s*\\("
transform = "eliminate double negation: not(not(a)) = a"
description = "Double negation elimination — involution property: NOT(NOT(x)) = x"
rule_type = "structural"
level = 3
evidence = "Involution: not(a) = nand(a,a); not(not(a)) = nand(nand(a,a), nand(a,a)) = a"

[[grammar]]
id = "nand_self_idempotent"
pattern = "nand\\s*\\(\\s*(\\w+)\\s*,\\s*\\1\\s*\\)"
transform = "nand(a,a) = not(a) — recognize self-NAND as negation"
description = "Self-NAND idempotency — nand(a,a) is equivalent to NOT(a), the fundamental derivation"
rule_type = "structural"
level = 3
evidence = "nand(a,a) = 1 - a*a = 1 - a = not(a); the sole axiom of the Sheffer stroke"

[[grammar]]
id = "implies_as_or_not"
pattern = "implies\\s*\\(\\s*(\\w+)\\s*,\\s*(\\w+)\\s*\\)"
transform = "rewrite as or(not(a), b) — implication is material conditional"
description = "Implication decomposition — implies(a,b) = or(not(a),b) = nand(nand(a,a), b)"
rule_type = "structural"
level = 6
evidence = "Material conditional: A→B ≡ ¬A∨B; in NAND: nand(nand(a,a), b)"

[[grammar]]
id = "xor_chain_pattern"
pattern = "xor\\s*\\("
transform = "xor(a,b) = or(and(a,not(b)), and(not(a),b)) — recognize XOR composition"
description = "XOR as composed gates — xor(a,b) decomposes to NOT/AND/OR, which each decompose to NAND"
rule_type = "structural"
level = 6
evidence = "xor(a,b) = a+b-2ab (continuous); equivalently or(and(a,not(b)),and(not(a),b))"

