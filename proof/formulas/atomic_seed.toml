# ─── Venture & Innovation Economics (Rahu = Ambition, Risk) ───────────────────

[[formula]]
id = "venture_risk_return"
tags = ["venture", "risk", "return", "rahu", "portfolio", "innovation_economics"]
domain = "rahu"
level = 9
inputs = ["failure_rate", "success_multiple", "investment_horizon_years"]
output = "expected_return_multiple"
expression = "(1 - failure_rate) * success_multiple + failure_rate * 0.0"
description = "Venture risk-return: (1-failure_pct) × success_multiple — Rahu: innovation portfolio expected value"
evidence = "Kerr et al 2014: venture returns follow power law — 65% fail, 25% return 1-5x, 10% return 10x+; diversification is key"

[[formula]]
id = "innovation_acceleration"
tags = ["acceleration", "moore", "innovation", "rahu", "exponential"]
domain = "rahu"
level = 12
inputs = ["doubling_period_years", "time_elapsed_years", "initial_performance"]
output = "accelerated_performance"
expression = "initial_performance * exp(ln(2) * time_elapsed_years / max(doubling_period_years, 0.1))"
description = "Innovation acceleration: exponential performance growth — Rahu: Moore's law and the accelerating returns of technology"
evidence = "Moore 1965: transistor density doubles every ~2 years; Kurzweil 2005: Law of Accelerating Returns across tech paradigms"

[[formula]]
id = "open_innovation_index"
tags = ["open_innovation", "collaboration", "rahu", "ecosystem", "r_and_d"]
domain = "rahu"
level = 6
inputs = ["external_idea_ratio", "collaboration_intensity", "ip_licensing_revenue_ratio"]
output = "open_innovation_score"
expression = "(external_idea_ratio * 0.5 + collaboration_intensity * 0.3 + ip_licensing_revenue_ratio * 0.2) * 10.0"
description = "Open innovation score: weighted composite of external sourcing, collaboration, and IP monetization — Rahu: Chesbrough open innovation"
evidence = "Chesbrough 2003: Open Innovation paradigm — useful knowledge is widely distributed; both internal and external paths to market"

[[formula]]
id = "digital_saturation_index"
tags = ["saturation", "digital", "adoption_limit", "rahu", "market"]
domain = "rahu"
level = 9
inputs = ["current_adoption", "addressable_market", "substitution_rate"]
output = "saturation_gap"
expression = "max(0.0, (addressable_market - current_adoption) / addressable_market) * (1.0 - substitution_rate)"
description = "Digital saturation gap: remaining headroom × (1 - substitution_threat) — Rahu: remaining innovation runway"
evidence = "Rogers 1962: late majority + laggards = 50% of market; diffusion slows as approaching saturation, substitution threats emerge"
