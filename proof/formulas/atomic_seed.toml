inputs = ["intervention_cost", "comparator_cost", "qaly_gained"]
output = "icer"
expression = "(intervention_cost - comparator_cost) / qaly_gained"
description = "Health economics: ICER = Δcost/ΔQALY — incremental cost-effectiveness ratio"
evidence = "WHO-CHOICE: threshold < 1×GDP per capita = very cost-effective"

[[formula]]
id = "treatment_effect_size_cohens_d"
tags = ["clinical", "statistics", "meta_analysis", "surya"]
domain = "surya"
level = 7
inputs = ["treatment_mean", "control_mean", "pooled_standard_deviation"]
output = "cohens_d"
expression = "(treatment_mean - control_mean) / pooled_standard_deviation"
description = "Meta-analysis: Cohen's d = (μt - μc)/σ_pooled — standardized mean difference"
evidence = "Cohen 1988: d = 0.2 small, 0.5 medium, 0.8 large effect size"

# ══════════════════════════════════════════════════════════════════════════════
# CBT & PSYCHOTHERAPY OUTCOME FORMULAS (added 2026-07-09, 10 formulas)
# Domain: Brihaspati (Psychology)
# ══════════════════════════════════════════════════════════════════════════════

[[formula]]
id = "cbt_symptom_reduction"
tags = ["psychotherapy", "CBT", "outcome", "brihaspati"]
domain = "brihaspati"
level = 5
inputs = ["pre_treatment_severity", "sessions_completed", "therapeutic_alliance"]
output = "post_treatment_severity"
expression = "pre_treatment_severity * exp(-0.15 * sessions_completed * therapeutic_alliance)"
description = "CBT outcome: post-treatment severity = baseline × exp(-0.15 × sessions × alliance)"
evidence = "Lambert's dose-response model: symptom reduction follows exponential decay with sessions and alliance quality"

[[formula]]
id = "reliable_change_index"
tags = ["psychotherapy", "outcome", "statistics", "brihaspati"]
domain = "brihaspati"
level = 6
inputs = ["pre_score", "post_score", "reliability"]
output = "rci"
expression = "(post_score - pre_score) / (pre_score * (1.0 - reliability) + 0.1)"
description = "CBT outcome: Reliable Change Index — clinical significance of change adjusted for measurement reliability"
evidence = "Jacobson & Truax 1991: RCI = (x₂ - x₁)/Sdiff where Sdiff = SD₁ × √(2 × (1 - r))"

[[formula]]
id = "exposure_hierarchy_progress"
tags = ["psychotherapy", "exposure", "CBT", "brihaspati"]
domain = "brihaspati"
level = 6
inputs = ["initial_subjective_units", "exposures_completed", "habituation_rate"]
output = "current_subjective_units"
expression = "initial_subjective_units * exp(-habituation_rate * exposures_completed)"
description = "CBT exposure: SUDS reduction = initial × exp(-habituation_rate × exposures)"
evidence = "Foa & Kozak 1986: emotional processing theory — habituation within and between exposure sessions"

[[formula]]
id = "cognitive_restructuring_effect"
tags = ["psychotherapy", "CBT", "cognition", "brihaspati"]
domain = "brihaspati"
level = 6
inputs = ["dysfunctional_belief_score", "restructuring_sessions", "rational_reattribution_skill"]
output = "belief_plausibility"
expression = "dysfunctional_belief_score / (1.0 + restructuring_sessions * rational_reattribution_skill * 0.3)"
description = "CBT cognitive restructuring: belief plausibility = initial / (1 + sessions × skill × 0.3)"
evidence = "Beck 1979: cognitive restructuring reduces belief conviction through evidence testing and reattribution"

[[formula]]
id = "therapy_attrition_risk"
tags = ["psychotherapy", "attrition", "dropout", "brihaspati"]
domain = "brihaspati"
level = 6
inputs = ["baseline_motivation", "therapeutic_alliance", "barriers_to_access", "early_improvement"]
output = "completion_probability"
expression = "1.0 / (1.0 + exp(-(baseline_motivation * 2.0 + therapeutic_alliance * 3.0 - barriers_to_access + early_improvement * 1.5)))"
description = "CBT attrition: logistic completion probability from motivation, alliance, barriers, and early response"
evidence = "Swift & Greenberg 2012: meta-analysis shows alliance and early improvement strongest dropout predictors"

[[formula]]
id = "behavioral_activation_dose"
tags = ["psychotherapy", "behavioral_activation", "depression", "brihaspati"]
domain = "brihaspati"
level = 5
inputs = ["baseline_activity", "scheduled_activities", "pleasure_mastery_rating"]
output = "activity_engagement"
expression = "baseline_activity + scheduled_activities * pleasure_mastery_rating * 0.2"
description = "CBT behavioral activation: activity engagement increases with scheduling and reinforcement quality"
evidence = "Lewinsohn 1974: behavioral activation increases response-contingent positive reinforcement"

[[formula]]
id = "cognitive_distortion_frequency"
tags = ["psychotherapy", "CBT", "cognitive_distortion", "brihaspati"]
domain = "brihaspati"
level = 5
inputs = ["initial_distortion_frequency", "cognitive_restructuring_skill", "weeks_of_practice"]
output = "distortion_reduction_ratio"
expression = "initial_distortion_frequency * (1.0 - 0.2 * sqrt(cognitive_restructuring_skill * weeks_of_practice))"
description = "CBT cognitive: distortion frequency = initial × (1 - 0.2 × √(skill × weeks))"
evidence = "Beck 1979: cognitive distortions decrease with practice of cognitive restructuring techniques"

[[formula]]
id = "panic_attack_severity_index"
tags = ["psychotherapy", "panic", "anxiety", "brihaspati"]
domain = "brihaspati"
level = 5
inputs = ["catastrophic_cognition_score", "interoceptive_fear", "avoidance_behavior"]
output = "panic_severity"
expression = "(catastrophic_cognition_score * 0.4 + interoceptive_fear * 0.35 + avoidance_behavior * 0.25) * 10.0"
description = "CBT panic: severity = weighted composite of catastrophic cognition, interoceptive fear, and avoidance"
evidence = "Clark 1986: catastrophic misinterpretation of bodily sensations central to panic maintenance"

[[formula]]
id = "relapse_prevention_index"
tags = ["psychotherapy", "relapse", "maintenance", "brihaspati"]
domain = "brihaspati"
level = 6
inputs = ["residual_symptoms", "coping_skill_repertoire", "social_support", "stress_exposure"]
output = "relapse_risk"
expression = "residual_symptoms * stress_exposure / (coping_skill_repertoire * social_support * 2.0 + 0.1)"
description = "CBT maintenance: relapse risk = (residual × stress) / (coping × support × 2)"
evidence = "Vittengl et al 2007: residual symptoms and coping skills strongest predictors of depression relapse"

[[formula]]
id = "therapy_response_classifier"
tags = ["psychotherapy", "outcome", "prediction", "brihaspati"]
domain = "brihaspati"
level = 7
inputs = ["early_improvement_4_weeks", "baseline_severity", "therapeutic_alliance", "chronocity_years"]
output = "response_probability"
expression = "1.0 / (1.0 + exp(-(early_improvement_4_weeks * 2.5 - baseline_severity * 0.5 + therapeutic_alliance * 1.5 - chronocity_years * 0.3)))"
description = "CBT response prediction: logistic probability from early improvement, severity, alliance, and chronicity"
evidence = "Lambert 2007: early response (4 weeks) strongest predictor of eventual treatment outcome"

# ☊ Rahu — Innovation, Technology, Seeker — Atomic Formulas
# Shadow Karmic Node | Modern ruler of Aquarius/Technology | Element: Air (innovation, networks)
