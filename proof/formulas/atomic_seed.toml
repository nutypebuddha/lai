expression = "carrying_capacity / (1 + (carrying_capacity / max(initial_penetration, 0.001) - 1) * exp(-growth_rate * time))"
description = "Technology adoption: logistic penetration curve — Rahu: the S-curve of innovation adoption"
evidence = "Grübler 1990: logistic models fit 200+ technology diffusions (steel, autos, internet)"

[[formula]]
