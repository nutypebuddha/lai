# ─── Network Science (Rahu = Networks, Connections, Viral Spread) ─────────────

[[formula]]
id = "metcalfe_network_value"
tags = ["network", "value", "metcalfe", "rahu", "connectivity", "innovation"]
domain = "rahu"
level = 3
inputs = ["user_count"]
output = "network_value"
expression = "user_count * user_count"
description = "Metcalfe's law: value ∝ n² — Rahu: network effects, quadratic value from linear connections"
evidence = "Metcalfe 1980: value of telecommunications network ∝ n² — validated for Facebook, Ethereum, etc."

[[formula]]
id = "reed_group_forming_potential"
tags = ["network", "value", "reed", "groups", "rahu", "scaling"]
domain = "rahu"
level = 6
inputs = ["user_count"]
output = "group_forming_potential"
expression = "2^user_count - 1 - user_count"
description = "Reed's law: value ∝ 2ⁿ — Rahu: exponential value from group-forming networks"
evidence = "Reed 1999: group-forming networks scale as 2ⁿ, far faster than broadcast (n) or transaction (n²)"

[[formula]]
id = "odd_kantara_network_resilience"
tags = ["network", "resilience", "robustness", "rahu", "failure"]
domain = "rahu"
level = 9
inputs = ["total_nodes", "critical_fraction"]
output = "network_resilience_index"
expression = "1.0 - critical_fraction / total_nodes"
description = "Network resilience: 1 - (critical_nodes / total) — Rahu: network robustness to node failure"
evidence = "Albert & Barabási 2000: scale-free networks robust to random failure, vulnerable to targeted attack"

[[formula]]
id = "bass_diffusion"
tags = ["diffusion", "adoption", "bass", "innovation", "rahu", "forecast"]
domain = "rahu"
level = 9
inputs = ["innovation_coeff", "imitation_coeff", "market_potential", "time"]
output = "adopters"
expression = "market_potential * (1 - exp(-(innovation_coeff + imitation_coeff) * time)) / (1 + imitation_coeff / innovation_coeff * exp(-(innovation_coeff + imitation_coeff) * time))"
description = "Bass diffusion model: adoption curve from innovation + imitation coefficients — Rahu: how innovations spread through populations"
evidence = "Bass 1969: S-shaped adoption curve fitted to 11 consumer durables — innovation (p) and imitation (q) drivers"

[[formula]]
id = "adoption_s_curve_velocity"
tags = ["diffusion", "s_curve", "velocity", "rahu", "inflection", "adoption"]
domain = "rahu"
level = 6
inputs = ["current_penetration", "market_potential", "adoption_rate"]
output = "adoption_velocity"
expression = "adoption_rate * current_penetration * (1 - current_penetration / market_potential)"
description = "Adoption S-curve velocity: logistic growth rate — Rahu: rate of technology adoption, fastest at inflection"
evidence = "Rogers 1962: Diffusion of Innovations — S-curve adoption, inflection at ~50% represents critical mass"

[[formula]]
id = "critical_mass_threshold"
tags = ["diffusion", "critical_mass", "threshold", "rahu", "network"]
domain = "rahu"
level = 9
inputs = ["installed_base", "total_addressable_market", "switching_cost"]
output = "critical_mass_ratio"
expression = "installed_base / total_addressable_market - switching_cost / 100.0"
description = "Critical mass threshold: penetration - switching_cost_ratio — Rahu: when a technology becomes self-sustaining"
evidence = "Rogers 1962: critical mass ≈ 10-20% penetration for most technologies; switching costs raise threshold"

