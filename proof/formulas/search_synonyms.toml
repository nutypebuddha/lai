# ─── Synonym Dictionary for Formula Search ────────────────────────────────
#
# Each group maps a canonical term to all its variants. When a user searches
# for any term in the group, ALL terms in the group are searched — so "gravity"
# also matches formulas tagged with "gravitational", "gravitation", etc.
#
# This is a flat lookup: every term maps bidirectionally to every other term
# in its group. There is no hierarchy or "preferred term" — all are equal.
#
# Deterministic, zero-dependency replacement for embedding-based semantic
# search. Editable at runtime (no recompile needed).
#
# Format: [group.<canonical>]
#         terms = ["variant1", "variant2", ...]

[group.gravity]
terms = ["gravity", "gravitational", "gravitation", "g_force", "g_field"]

[group.energy]
terms = ["energy", "energetic", "joule", "joules", "work"]

[group.force]
terms = ["force", "forces", "newton", "newtons", "f=ma"]

