

[[formula]]
id = "nor"
formula_type = "logic"
domain = "Mangala"
inputs = ["a", "b"]
output = "nor_out"
expression = "1 - a - b + a * b"
description = "NOR: ¬(a ∨ b) = 1-a-b+ab — Mars: rejection of union, derivable as nand(nand(a,a),nand(b,b))... inverted"
evidence = "Truth table: NOR(0,0)=1, else 0. Also functionally complete. De Morgan: ¬(a∨b) = ¬a ∧ ¬b"
tags = ["logic", "mars", "gate", "functional_complete"]


[[formula]]
id = "xnor"
formula_type = "logic"
domain = "Mangala"
inputs = ["a", "b"]
output = "xnor_out"
expression = "1 - a - b + 2 * a * b"
description = "XNOR: ¬(a ⊕ b) = 1-a-b+2ab — Mars: equivalence gate, 1 iff a=b"
evidence = "Truth table: XNOR(a,b)=1 iff a=b. Complement of XOR."
tags = ["logic", "mars", "gate", "equivalence"]


