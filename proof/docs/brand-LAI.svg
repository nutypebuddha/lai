<?xml version="1.0" encoding="UTF-8"?>
<!-- L.ai — old-English L, cyberpunk witch-hat glitch glyph (brand asset) -->
<svg xmlns="http://www.w3.org/2000/svg" width="120" height="160" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7df9ff"/>
      <stop offset="1" stop-color="#b026ff"/>
    </linearGradient>
    <filter id="glitch">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3"/>
    </filter>
  </defs>

  <!-- witch-hat crown (old-English L, crossed descender) -->
  <g filter="url(#glitch)">
    <path d="M60 8 L92 70 L28 70 Z" fill="url(#hat)" stroke="#0ff" stroke-width="1.5"/>
    <!-- brim -->
    <path d="M18 74 Q60 64 102 74 L98 86 Q60 78 22 86 Z" fill="#b026ff"/>
    <!-- terminal block (the L body) -->
    <rect x="44" y="86" width="26" height="58" fill="#0a0a12" stroke="#7df9ff" stroke-width="2"/>
    <rect x="44" y="120" width="58" height="24" fill="#0a0a12" stroke="#7df9ff" stroke-width="2"/>
    <!-- crossed descender of Ł -->
    <line x1="30" y1="108" x2="92" y2="108" stroke="#7df9ff" stroke-width="2"/>
  </g>

  <!-- glitch slices -->
  <rect x="0" y="40" width="120" height="2" fill="#ff2bd6" opacity="0.6"/>
  <rect x="0" y="100" width="120" height="1.5" fill="#7df9ff" opacity="0.5"/>
</svg>
