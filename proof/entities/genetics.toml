# Genetics Entities (20 genes relevant to psychiatry)
# Domain: Surya (Biology/Medicine)
# Added: 2026-07-09
#
# Each gene entity has properties:
#   risk_allele_frequency    — population frequency of the risk-associated variant (0-1)
#   psychiatric_effect_size  — odds ratio or effect size for psychiatric phenotypes
#   expression_in_brain      — relative expression level in brain tissue (0-1)
#   druggability             — potential as a drug target (0-1)
#   pharmacogenetic_relevance — relevance for treatment response prediction (0-1)

# ═══════════════════════════════════════════════════════════════
# NEUROTRANSMITTER METABOLISM (5)
# ═══════════════════════════════════════════════════════════════

[[entity]]
id = "comt"
name = "COMT (Catechol-O-Methyltransferase)"
domain = "surya"
description = "Dopamine and norepinephrine metabolism. Val158Met polymorphism (rs4680) affects prefrontal dopamine. Met allele = lower activity = better cognition but higher anxiety risk."
tags = ["genetics", "dopamine", "prefrontal", "cognition", "pharmacogenetics", "psychiatry"]
properties = { risk_allele_frequency = 0.5, psychiatric_effect_size = 1.3, expression_in_brain = 0.85, druggability = 0.4, pharmacogenetic_relevance = 0.7 }

[[entity]]
id = "maoa"
name = "MAOA (Monoamine Oxidase A)"
domain = "surya"
description = "Serotonin, norepinephrine, dopamine metabolism. MAOA-uVNTR promoter polymorphism. Low-activity allele associated with aggression and impulsivity. Target of MAOIs."
