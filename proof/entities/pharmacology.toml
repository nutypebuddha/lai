# Pharmacology Entities (50 drugs)
# Domain: Surya (Biology/Medicine)
# Added: 2026-07-09
#
# Each drug has pharmacokinetic properties:
#   half_life_hours       — elimination half-life
#   therapeutic_index     — TD50/ED50 ratio (higher = safer)
#   bioavailability       — fraction reaching systemic circulation
#   protein_binding       — fraction bound to plasma proteins
#   renal_clearance       — fraction excreted unchanged by kidneys
#   target_serotonin      — serotonin receptor affinity (0-1)
#   target_dopamine       — dopamine receptor affinity (0-1)
#   target_norepinephrine — norepinephrine receptor affinity (0-1)
#   receptor_affinity_kd  — dissociation constant in nM (lower = stronger)
#   volume_of_distribution_Lkg — apparent Vd per kg
#
# Values are population means from clinical pharmacology references.

