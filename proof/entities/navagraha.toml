# Navagraha — The 9 Vedic Planetary Deities
# Each graha entity carries full Vedic classification for gyroscopic settling.
#
# The `domain` field is set to the owning zodiac node for wheel placement.
# Vedic-specific fields (graha, guna, tattva, etc.) are used by the Vedic
# classification layer to compute guna balance, bhūta (element), etc.

# ─── Surya (Sun) — Atma Karaka, soul indicator ───────────────────────────────

[[entity]]
id = "surya"
name = "Surya"
domain = "surya"
description = "Navagraha: Sun. Atma Karaka (soul significator). Kingship, vitality, self, authority. Rules Leo."
tags = ["navagraha", "graha", "sun", "luminary", "king", "atma_karaka"]
properties = { vitality = 0.95, leadership = 0.9, self_expression = 0.88, authority = 0.85 }
constants = { mass_kg = 1.9885e30, radius_m = 6.957e8, luminosity_w = 3.828e26, surface_temp_k = 5778 }
graha = "surya"
rashi = "simha"
guna = "sattva"
tattva = "agni"
purushartha = "dharma"
day = "sunday"
ruled_nakshatras = ["krittika", "uttara_phalguni", "uttara_shadha"]
mantra = "ॐ ह्रां ह्रीं ह्रौं सः सूर्याय नमः"
bija = "ह्रां"

