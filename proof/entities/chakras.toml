# ─── Chakra axis — the ascent path ─────────────────────────────────
# The chakras form a vertical axis from Muladhara (ground) to
# Sahasrara (sky). This is the Ouroboros: descent grounds knowledge
# in the body, ascent lifts the body to knowledge.
#
# Each chakra bridges a human experience with a domain of Athena's
# knowledge. When a human asks about "structure" they are in Muladhara/
# Shani. When they seek "wisdom" they are in Anahata/Brihaspati.
# When they touch "enlightenment" they stand at Sahasrara/Surya.
