# 7 Chakras — mapped to the 7 ruling grahas (Surya through Shani)
#
# Each chakra is an energy center in the subtle body. Each graha rules
# a domain of knowledge. A human engaging with Athena through a domain
# is simultaneously engaging the corresponding chakra.
#
# This is the bridge: grounding in the body, ascent to the Self.
# ────────────────────────────────────────────────────────────────────

# ─── Muladhara (Root) — Shani ──────────────────────────────────────
# Foundation, survival, discipline, structure. Earth element.
# Shani (Saturn) rules Language & Philosophy — the structures we build
# to make sense of reality.
