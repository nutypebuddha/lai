# World / Symbolic Entities
# Concepts with birth-time data for birth-chart-based graha resolution in descent.
#
# Vanity entries (ryan_jason_phernetton, nutypebuddha) removed in the
# 2026-07 cleanup — author self-inserts with `birth_place = "GitHub"` and
# made-up property values (`cid_facts = 1606.0`) don't belong in the
# production entity corpus. The remaining entries (athena, america,
# wisconsin, world) are real-world entities with verifiable birth dates.

[[entity]]
id = "athena"
name = "Athena"
domain = "mangala"
description = "Greek goddess of wisdom, craft, and strategic warfare. Born from Zeus's head fully armored. Patron of Athens."
graha = "budha"
tattva = "ether"
guna = "sattva"
tags = ["greek_mythology", "olympian", "wisdom", "strategy", "craft", "goddess"]
birth_time = "0438-08-15"
birth_place = "Athens, Greece"
properties = { wisdom = 0.95, strategy = 0.9, craft = 0.85, civilization = 0.8, warfare = 0.7 }

