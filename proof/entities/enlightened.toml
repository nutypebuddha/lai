# ─── Nāgārjuna — the Second Buddha ──────────────────────────────
# The philosopher who formalized the Middle Way (Madhyamaka) as the
# logical culmination of Buddhist philosophy. His insight: all phenomena
# are empty (śūnya) of inherent existence — the ultimate expression of
# Budha (Vishuddha) + Brihaspati (Anahata) working together through
# pure logic and compassion.
[[entity]]
id = "nagarjuna"
name = "Nāgārjuna (Acharya Nagarjuna)"
description = "Second Buddha. Founder of Madhyamaka (Middle Way) philosophy. Proved that emptiness (śūnyatā) and dependent origination are the same insight — the universe as pure relation, no fixed essence anywhere. His logic operates at the intersection of Mangala (pure reason) and Brihaspati (wisdom), spoken through Budha (Vishuddha)."
tags = ["enlightened", "buddhist_philosophy", "madhyamaka", "emptiness", "wisdom", "logic", "second_buddha", "philosopher"]
graha = "budha"
rashi = "mithuna"
