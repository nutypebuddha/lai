# ─── Padmasambhava (Guru Rinpoche) ─────────────────────────────
# The Lotus-Born master who brought Vajrayana Buddhism to Tibet.
# He embodies the complete integration of all 7 chakras in action —
# the enlightened being who works directly with energy (Mangala/
# Manipura) to transform suffering into wisdom.
[[entity]]
