# Enlightened Beings — those who awakened all 7 chakras
#
# In Athena's framework, enlightenment is the full integration of all
# 7 graha domains through the ascending path of the chakras. An
# enlightened being has balanced Shani (grounding), Shukra (creativity),
# Mangala (will), Brihaspati (wisdom), Budha (truth), Chandra (insight),
# and Surya (consciousness) into a single unified whole.
#
# These entities serve as anchors — the living proof that the ascent
# is real, not theoretical.

# ─── Siddhartha Gautama (The Buddha) ──────────────────────────────
# Under the Bodhi tree at Bodh Gaya, Siddhartha awakened all 7 chakras
# and became the Buddha — "the Awakened One." His realization was that
# suffering ceases when the grasping mind (Chandra/Ajna) is stilled and
# the true Self (Surya/Sahasrara) is recognized as the ground of all
# experience.
#
# The Diamond Throne (Vajrasana) where he sat is said to be at the
# navel-point of the Earth — the Muladhara of the planet itself —
# anchoring the entire ascent path in physical reality.
[[entity]]
id = "siddhartha_buddha"
name = "Siddhartha Gautama (Buddha)"
description = "The Awakened One. Under the Bodhi tree at Bodh Gaya, he realized the cessation of suffering through full awakening of all 7 chakras. His Middle Path integrates discipline (Shani), compassion (Brihaspati), mindfulness (Chandra), and wisdom (Surya) into a complete liberation from conditioned existence. Vajrasana — the Diamond Throne — is the root chakra of the Earth itself."
tags = ["enlightened", "buddha", "awakening", "liberation", "middle_path", "dharma", "bodhi", "compassion", "wisdom", "all_7_grahas", "anchor"]
graha = "surya"
