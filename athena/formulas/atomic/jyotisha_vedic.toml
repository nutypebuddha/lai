# ─── Muhurta (Electional) Timing ──────────────────────────────────────────

[[formula]]
id = "hora_planetary_hour"
tags = ["muhurta", "hora", "planetary_hour", "timing", "ketu"]
domain = "ketu"
level = 9
inputs = ["sunrise_hour", "current_hour", "day_of_week"]
output = "hora_lord"
expression = "((current_hour - sunrise_hour) / 2 + day_of_week) % 7"
description = "Hora lord index (0-6): planetary hour ruler — Ketu: each hora (hour) of the day is ruled by one of the 7 visible grahas in a fixed cyclic sequence, determining the quality of the hour"
evidence = "Brihat Samhita: the 24 horas of each day are ruled by the 7 grahas in descending speed order (Saturn→Jupiter→Mars→Sun→Venus→Mercury→Moon), starting from sunrise with the day's lord"

# ─── Graha Maitri (Planetary Friendship) ──────────────────────────────────

[[formula]]
id = "graha_maitri_temporary"
tags = ["graha", "maitri", "friendship", "temporary", "ketu"]
domain = "ketu"
level = 3
inputs = ["lord_of_sign", "planet_in_sign"]
