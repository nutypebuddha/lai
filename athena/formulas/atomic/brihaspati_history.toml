# ─── Fire: Statistical Inference & Bayesian Truth-Seeking (Jupiter = Expansion, Truth) ─
# Mutable Fire = expanding knowledge through evidence, updating beliefs, wisdom extraction from data.

[[formula]]
id = "bayes_theorem"
tags = ["statistics", "bayes", "inference", "fire", "mutable", "jupiter", "truth", "update"]
domain = "brihaspati"
level = 9
inputs = ["likelihood", "prior", "evidence"]
output = "posterior"
expression = "likelihood * prior / evidence"
description = "Bayes' theorem: P(H|E) = P(E|H)P(H)/P(E) — Mutable Fire: belief update, Jupiter wisdom expansion, truth seeking"
evidence = "Conditional probability: P(H∩E) = P(H|E)P(E) = P(E|H)P(H) → Bayes' rule — exact from Kolmogorov axioms"

[[formula]]
id = "marginal_likelihood"
tags = ["statistics", "bayes", "marginal", "evidence", "fire", "mutable", "jupiter", "composition"]
domain = "brihaspati"
level = 9
inputs = ["likelihood", "prior", "false_positive_rate"]
output = "evidence"
expression = "likelihood * prior + false_positive_rate * (1 - prior)"
description = "Marginal likelihood P(E) = P(E|H)P(H) + P(E|¬H)P(¬H) — Mutable Fire: compositional evidence, Jupiter total probability"
evidence = "Law of total probability: P(E) = P(E|H)P(H) + P(E|¬H)P(¬H) — exact from Kolmogorov axioms, closes the bayes_theorem loophole"

[[formula]]
id = "law_of_large_numbers"
tags = ["statistics", "convergence", "large_numbers", "fire", "jupiter", "truth", "sample"]
domain = "brihaspati"
level = 9
inputs = ["sample_mean", "population_mean", "n"]
output = "sampling_error"
expression = "abs(sample_mean - population_mean)"
description = "Law of large numbers: X̄_n → μ as n→∞ — Mutable Fire: truth convergence, Jupiter cumulative wisdom"
evidence = "Chebyshev: P(|X̄_n-μ|>ε) ≤ σ²/(nε²) → 0 as n→∞ — weak LLN from Chebyshev, strong LLN from Kolmogorov"

[[formula]]
id = "central_limit_theorem"
tags = ["statistics", "clt", "convergence", "gaussian", "fire", "jupiter", "distribution"]
domain = "brihaspati"
level = 9
inputs = ["sample_size", "population_sd"]
output = "standard_error"
expression = "population_sd / sqrt(sample_size)"
description = "Central limit theorem: √n(X̄_n-μ)/σ → N(0,1) — Mutable Fire: distribution convergence, Jupiter universal law"
evidence = "Lindeberg-Lévy CLT: characteristic function of standardized sum converges to e^(-t²/2) — exact in limit"

[[formula]]
id = "maximum_likelihood"
tags = ["statistics", "mle", "estimation", "fire", "jupiter", "truth", "optimal"]
domain = "brihaspati"
level = 12
inputs = ["log_likelihood"]
output = "mle"
expression = "log_likelihood"
description = "Maximum likelihood estimation: θ̂ = argmax log L(θ|X) — Mutable Fire: truth seeking through evidence, Jupiter wisdom"
evidence = "Consistency: θ̂_MLE → θ* under regularity; asymptotic normality: √n(θ̂-θ) → N(0,I(θ)⁻¹); efficiency: Cramér-Rao bound"

[[formula]]
id = "shannon_sampling_theorem"
tags = ["statistics", "sampling", "nyquist", "shannon", "fire", "jupiter", "reconstruction"]
domain = "brihaspati"
level = 12
inputs = ["bandwidth"]
output = "nyquist_rate"
expression = "2 * bandwidth"
description = "Nyquist-Shannon: f_s ≥ 2f_max — Mutable Fire: adequate sampling for reconstruction, Jupiter complete capture"
evidence = "Shannon 1949: sinc interpolation: f(t) = Σf(n/2B)sinc(2Bt-n) — exact reconstruction if sampled above Nyquist rate"

# ─── 9th House: Temporal Analysis, Trend Detection, Learning Curves ───────────
# 9th House = higher learning, distant time/space, trends over long horizons, wisdom from experience.

[[formula]]
id = "exponential_smoothing"
tags = ["time_series", "forecasting", "smoothing", "ninth_house", "jupiter", "trend", "learning"]
domain = "brihaspati"
level = 6
inputs = ["previous_forecast", "actual_value", "alpha"]
output = "new_forecast"
expression = "alpha * actual_value + (1 - alpha) * previous_forecast"
description = "Exponential smoothing: ŷ_t+1 = αy_t + (1-α)ŷ_t — 9th House: learning from history, Jupiter wisdom accumulation"
evidence = "Exponentially weighted moving average: ŷ_t+1 = Σ_{k=0}∞ α(1-α)ᵏ y_t-k — exact recursive form of adaptive learning"

[[formula]]
id = "diminishing_returns"
tags = ["economics", "learning", "returns", "ninth_house", "fire", "saturation", "jupiter"]
domain = "brihaspati"
level = 6
inputs = ["current_knowledge", "max_knowledge", "increment"]
output = "knowledge_gain"
expression = "increment * (max_knowledge - current_knowledge) / max_knowledge"
description = "Diminishing returns: ΔK ∝ (K_max - K_cur) — Mutable Fire: saturating knowledge, Jupiter wisdom limit"
evidence = "Learning curve: y = ax^b, b∈(-1,0) — proportional improvement per doubling of experience follows power law"

[[formula]]
id = "exponential_moving_average"
tags = ["statistics", "moving_average", "smoothing", "ninth_house", "fire", "jupiter", "trend"]
domain = "brihaspati"
level = 6
inputs = ["values", "n"]
output = "moving_avg"
expression = "values / n"
description = "Moving average: MA_n = Σᵢ₌₁ⁿ y_t-i / n — 9th House: trend from temporal data, Jupiter cumulative measurement"
evidence = "Linear filter: ŷ_t = (1/n)Σ_{i=1}ⁿ y_t-i — minimizes E[(ŷ_t - y_t)²] under i.i.d. assumptions"

[[formula]]
id = "power_law_learning"
tags = ["statistics", "power_law", "learning", "curve", "ninth_house", "fire"]
domain = "brihaspati"
level = 9
inputs = ["time", "exponent", "scale"]
output = "performance"
expression = "scale * time^(-exponent)"
description = "Power law learning: performance ∝ t^(-α) — Mutable Fire: improvement through experience, Jupiter expanding wisdom"
evidence = "Log-log linear: log P = log a - α log t — cross-validated across tasks, α ≈ 0.5 ± 0.2 (Wright 1936, Newell-Rosenbloom 1981)"

