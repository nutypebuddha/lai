[[formula]]
id = "shannon_entropy"
tags = ["information", "entropy", "communication", "mutable", "air", "shannon", "mercury"]
domain = "budha"
level = 12
inputs = ["probability"]
output = "entropy_bits"
expression = "-probability * log10(probability) / log10(2)"
description = "Shannon entropy: H = -Σ p log₂ p — Mutable Air: information content, Mercury measure of uncertainty"
evidence = "Shannon 1948: H(X) = -Σ p(x) log p(x) — unique measure satisfying continuity, symmetry, additivity"

