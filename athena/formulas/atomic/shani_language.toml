[[formula]]
id = "levenshtein_distance"
tags = ["linguistics", "edit_distance", "string", "earth", "cardinal", "alignment", "comparison"]
domain = "shani"
level = 9
inputs = ["deletions", "insertions", "substitutions"]
output = "edit_distance"
expression = "deletions + insertions + substitutions"
description = "Levenshtein distance: min edits (insert/delete/substitute) — Cardinal Earth: difference measurement, Saturn boundary, structural comparison"
evidence = "Dynamic programming: D[i,j] = min(D[i-1,j]+1, D[i,j-1]+1, D[i-1,j-1]+cost) — exact optimal via Wagner-Fischer algorithm"

# ─── Cardinal: Information Theory of Language (Saturn = Entropy, Mars = Channel) ──
# Cardinal = initiating communication. Earth = channel. Saturn = constraints.

[[formula]]
id = "zipfs_law"
tags = ["linguistics", "zipf", "frequency", "rank", "cardinal", "earth", "saturn", "law"]
domain = "shani"
level = 6
inputs = ["rank", "n"]
output = "word_frequency"
expression = "0.1 / rank"
description = "Zipf's law: f ∝ 1/r — Cardinal Earth: rank-frequency, Saturn power law, structural universality"
evidence = "Zipf 1949: P(r) ∝ r^(-α), α≈1 — Mandelbrot rationalization: optimal coding under letter cost; exhibits across ~5000 languages"

[[formula]]
id = "flesch_reading_ease"
tags = ["linguistics", "readability", "flesch", "cardinal", "earth", "complexity", "text"]
domain = "shani"
level = 9
inputs = ["syllables", "words", "sentences"]
output = "score"
expression = "206.835 - 1.015 * (words / sentences) - 84.6 * (syllables / words)"
description = "Flesch Reading Ease: RE = 206.835 - 1.015(w/s) - 84.6(syl/w) — Cardinal Earth: text accessibility, Saturn readability measure"
evidence = "Flesch 1948: regression from reading comprehension scores — validated against McCall-Crabbs reading tests, R²≈0.7"

[[formula]]
id = "type_token_ratio"
tags = ["linguistics", "lexical_diversity", "ttr", "cardinal", "earth", "variation"]
domain = "shani"
level = 6
inputs = ["unique_words", "total_words"]
output = "ttr"
expression = "unique_words / total_words"
description = "Type-token ratio: TTR = V/N — Cardinal Earth: lexical variation, Saturn structural diversity"
evidence = "Templin 1957: TTR decreases with text length (√N) — corrected TTR = V/√(2N) for cross-text comparison (Guiraud 1954)"

[[formula]]
id = "entropy_text"
tags = ["linguistics", "entropy", "information", "cardinal", "earth", "shannon", "predictability"]
domain = "shani"
level = 12
inputs = ["character_probabilities"]
output = "char_entropy"
expression = "-sum(character_probabilities * log10(character_probabilities) / log10(2))"
description = "Shannon character entropy: H = -Σp_i log₂ p_i — Cardinal Earth: information rate, Saturn bound, language capacity"
evidence = "Shannon 1951: English character entropy ≈ 1.3 bits/char (letter) ≈ 0.6-1.3 bits (word context) — redundancy ~50%"

[[formula]]
id = "harmonic_dependency_distance"
tags = ["linguistics", "dependency", "dirven", "cross_linguistic", "cardinal", "earth"]
domain = "shani"
level = 12
inputs = ["head_final_deps", "head_initial_deps"]
output = "harmonic_score"
expression = "(head_initial_deps - head_final_deps) / (head_initial_deps + head_final_deps)"
description = "Dependency direction harmony: (initial - final)/(initial + final) — Cardinal Earth: branching direction, Saturn structural consistency"
evidence = "Greenberg 1963: VO languages have initial-dependent structure, OV languages have final-dependent — Dryer 1992: 625 language sample"

