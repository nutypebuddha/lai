expression = "category * (child1 + child2)"
description = "Phrase structure: XP → spec X' and X' → X comp — 10th House: hierarchical supremacy, Saturn authority, constituent tree"
evidence = "X-bar theory (Chomsky 1970): all phrases project XP(→X'→X₀) — universal structural template across languages"

[[formula]]
id = "parse_tree_depth"
tags = ["linguistics", "parse", "tree", "depth", "tenth_house", "saturn", "structure"]
domain = "shani"
level = 6
inputs = ["embeddings", "sentence_length"]
output = "embedding_depth"
expression = "embeddings / sentence_length"
description = "Parse tree depth: embedded clause ratio — 10th House: structural depth, Saturn hierarchical authority, nested mastery"
evidence = "Center-embedding: depth > 2 causes processing difficulty (Miller-Chomsky 1963) — nested structures → O(n²) complexity"

[[formula]]
