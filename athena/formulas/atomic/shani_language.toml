# ─── Earth: Formal Grammars & Syntax (Saturn = Structure, Mars = Execution) ────
# Cardinal Earth = structure initiated. Saturn = rules/boundaries. Mars exalted = active parsing.

[[formula]]
id = "context_free_grammar"
tags = ["linguistics", "grammar", "chomsky", "formal", "cardinal", "earth", "saturn", "syntax"]
domain = "shani"
level = 12
inputs = ["productions", "nonterminals", "terminals"]
output = "grammar_complexity"
expression = "productions * nonterminals / terminals"
description = "CFG: G = (V,Σ,R,S) with productions A → α — Cardinal Earth: syntactic structure, Saturn rules, Mars parsing"
evidence = "Chomsky 1959: context-free grammars correspond to pushdown automata — derivable parse trees from pumping lemma"

[[formula]]
id = "categorial_grammar"
tags = ["linguistics", "categorial", "directional", "cardinal", "earth", "saturn", "type", "lambda"]
domain = "shani"
level = 12
inputs = ["argument_type", "result_type"]
output = "functor_type"
expression = "result_type / argument_type"
description = "Categorial grammar: A/B + B → A by function application — Cardinal Earth: syntactic category, Saturn type structure"
evidence = "Lambek 1958: Sequent calculus for syntactic types — associative Lambek calculus: (A/B, B) ⊢ A via forward application"

[[formula]]
id = "dependency_distance"
tags = ["linguistics", "dependency", "grammar", "distance", "cardinal", "earth", "saturn", "syntax"]
domain = "shani"
level = 9
inputs = ["head_position", "dependent_position"]
output = "dependency_length"
expression = "abs(head_position - dependent_position)"
description = "Dependency length: |h - d| — Cardinal Earth: syntactic distance, Saturn span, structural boundary"
evidence = "Universal Dependencies: average dependency length minimized cross-linguistically (Ferrer-i-Cancho 2006) — O(n log n) bound"

[[formula]]
id = "word_order_hierarchy"
tags = ["linguistics", "word_order", "typology", "cardinal", "earth", "greenberg", "universal"]
domain = "shani"
level = 6
inputs = ["object_position", "verb_position", "subject_position"]
output = "word_order_type"
expression = "subject_position + verb_position + object_position"
description = "Word order typology: SVO = 1+2+3 — Cardinal Earth: ordered structure, Saturn hierarchical classification"
evidence = "Greenberg 1963: Universal 1 — subject precedes object in dominant order; 41-dialect sample → 6 possible orders"

# ─── 10th House: Authority, Hierarchy, Parse Trees, Constituency ──────────────
# 10th House = summit, authority, peak, hierarchical structure, mastery, top-down parsing.

[[formula]]
id = "phrase_structure_rule"
tags = ["linguistics", "phrase_structure", "constituency", "tenth_house", "cardinal", "earth", "saturn"]
domain = "shani"
level = 6
inputs = ["category", "child1", "child2"]
