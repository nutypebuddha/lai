# L.ai — CI Quality Gate
# Builds the whole workspace (proof, gate, athena) + wasm crates + bridge (Node).

name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check (fmt, clippy, deny, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Cache cargo-deny DB
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.cargo/advisory-dbs
          key: cargo-deny-${{ hashFiles('deny.toml') }}

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Check clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check licenses, bans, advisories
        run: cargo deny check

      - name: Run tests (workspace)
        run: cargo test --workspace

      - name: Swiss-Ephemeris oracle gate
        run: cargo test -p laverna --test swiss_oracle

      - name: CLI/MCP parity gate
        run: cargo test -p laverna --features mcp --test mcp_parity

  wasm-build:
    name: WASM build (proof + gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli
      - name: Build proof WASM
        run: cargo build --release --target wasm32-unknown-unknown -p laverna-wasm
      - name: Build gate WASM
        run: cargo build --release --target wasm32-unknown-unknown -p lai-gate-wasm
      - name: Generate bindings
        run: |
          wasm-bindgen target/wasm32-unknown-unknown/release/laverna_wasm.wasm --out-dir proof/laverna-wasm/www --target web
          wasm-bindgen target/wasm32-unknown-unknown/release/lai_gate_wasm.wasm --out-dir gate/cid-wasm/www --target web

  bridge:
    name: Bridge (Node) lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: bridge
        run: npm ci || npm install
      - name: Syntax check
        working-directory: bridge
        run: node --check src/cid.js && node -e "require('./src/adapters/grok.js')" || true

  release-assets:
    name: Release assets (static x86_64 + llama bundle)
    needs: [check, wasm-build, bridge]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build static x86_64-musl release
        run: |
          cargo build --release --target x86_64-unknown-linux-musl \
            --features "mcp websearch budget llm milp graph"
      - name: Verify static linkage
        run: |
          bin=target/x86_64-unknown-linux-musl/release/laverna
          file "$bin"
          if readelf -d "$bin" | grep -q NEEDED; then
            echo "::error::$bin is dynamically linked"; exit 1
          fi
      - name: Bundle llama engine
        run: |
          mkdir -p dist/bin/llama dist/bin/models
          cp target/x86_64-unknown-linux-musl/release/laverna dist/bin/laverna-x86_64
          cp -rL bin/llama/. dist/bin/llama/
          [ -f bin/models/.gitkeep ] && cp bin/models/.gitkeep dist/bin/models/
          tar -C dist -czf laverna-x86_64-bundle.tar.gz bin
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bin/laverna-x86_64
            laverna-x86_64-bundle.tar.gz
