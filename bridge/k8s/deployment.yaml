apiVersion: apps/v1
kind: Deployment
metadata:
  name: cid-bridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cid-bridge
  template:
    metadata:
      labels:
        app: cid-bridge
    spec:
      containers:
      - name: cid-bridge
        image: codeberg.org/nutypebuddha/cid-bridge:latest
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
---
apiVersion: v1
kind: Service
metadata:
  name: cid-bridge
spec:
  selector:
    app: cid-bridge
  ports:
  - port: 3000
    targetPort: 3000
